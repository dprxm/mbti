<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 학교생활 MBTI 고양이 테스트</title>

<style>
*{
    box-sizing:border-box;
    font-family:"Arial","Pretendard",sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(#ffe5f1,#ffd2e8);
    overflow:hidden;
}

.cat{
    position:fixed;
    font-size:45px;
    opacity:.5;
    animation:move 4s infinite;
}

.c1{top:10%;left:8%}
.c2{top:15%;right:10%}
.c3{bottom:10%;left:15%}
.c4{bottom:15%;right:10%}

@keyframes move{
    50%{transform:translateY(-20px)}
}

.box{
    width:90%;
    max-width:600px;
    background:white;
    padding:30px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 10px 30px #ff9fc5;
}

h1{
    color:#ff65a5;
}

button{
    border:0;
    background:#ff83bd;
    color:white;
    padding:15px 30px;
    border-radius:30px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#ff579e;
}

.progress{
    width:100%;
    height:12px;
    background:#eee;
    border-radius:20px;
    margin:20px 0;
}

.bar{
    height:100%;
    width:0;
    background:#ff75b3;
    border-radius:20px;
}

.question{
    font-size:21px;
    font-weight:bold;
    margin:20px 0;
}

.answer{
    background:#fff3f8;
    border:2px solid #ffd0e3;
    padding:15px;
    border-radius:20px;
    margin:12px;
    cursor:pointer;
}

.answer:hover{
    background:#ffd9e9;
}

#quiz,#result{
    display:none;
}

.bigcat{
    font-size:80px;
}

.mbti{
    color:#ff579e;
    font-size:45px;
    font-weight:bold;
}

.desc{
    line-height:1.7;
    color:#555;
}

</style>
</head>


<body>

<div class="cat c1">🐱</div>
<div class="cat c2">😺</div>
<div class="cat c3">🐾</div>
<div class="cat c4">🐈</div>


<div class="box">


<div id="start">

<div class="bigcat">😻</div>

<h1>학교생활 MBTI 고양이 테스트</h1>

<p>
나는 어떤 학교생활 고양이일까?<br>
친구 관계와 공부 스타일로 알아보자 🐾
</p>

<button onclick="start()">테스트 시작</button>

</div>



<div id="quiz">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="question" id="q"></div>

<div id="answers"></div>

</div>




<div id="result">

<div class="bigcat" id="cat"></div>

<div class="mbti" id="mbti"></div>

<h2 id="title"></h2>

<p class="desc" id="desc"></p>

<button onclick="location.reload()">다시하기</button>

</div>


</div>



<script>

const questions=[

["친구가 전학 왔다!","먼저 말을 건다 😸","기회를 기다린다 🐱","EI"],
["시험 공부는?","계획표를 만든다 📚","마지막에 집중한다 🔥","JP"],
["조별과제에서 나는?","아이디어를 낸다 💡","자료 정리를 한다 📝","SN"],
["친구가 고민을 말한다","공감부터 한다 💗","해결책을 찾는다 🔍","TF"],
["쉬는 시간에는?","친구들과 논다 🎉","혼자 쉰다 🌙","EI"],
["축제 준비를 한다면?","새로운 것을 시도한다✨","검증된 방법을 쓴다📖","SN"],
["갑자기 일정이 바뀌었다","재밌겠다! 적응한다","다시 계획을 짠다","JP"],
["친구와 의견이 다르다","상대 의견을 생각한다","논리적으로 판단한다","TF"],
["동아리를 고른다면?","새로운 경험","잘하는 활동","SN"],
["발표를 맡았다","재미있게 준비한다","완벽하게 준비한다","JP"],
["학교 행사에서는?","앞에서 참여한다","뒤에서 돕는다","EI"],
["새 친구를 사귈 때?","빠르게 친해진다","천천히 친해진다","EI"]

];


let index=0;

let score={
E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0
};


function start(){

document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";

show();

}



function show(){

let q=questions[index];

document.getElementById("q").innerHTML="🐾 "+q[0];

document.getElementById("bar").style.width=
(index/questions.length*100)+"%";


document.getElementById("answers").innerHTML=`

<div class="answer" onclick="answer(0)">
${q[1]}
</div>

<div class="answer" onclick="answer(1)">
${q[2]}
</div>

`;

}



function answer(n){

let type=questions[index][3];

if(n==0)
score[type[0]]++;
else
score[type[1]]++;


index++;


if(index<questions.length)
show();

else
result();

}




const cats={

INTJ:["🐈‍⬛","전략가 고양이","계획을 세우고 목표를 향해 가는 똑똑한 고양이!"],

INTP:["🤓🐱","탐구왕 고양이","궁금한 것을 끝까지 파고드는 호기심 고양이!"],

ENTJ:["👑🐱","리더 고양이","친구들을 이끄는 카리스마 고양이!"],

ENTP:["😹","아이디어 고양이","재미있는 생각이 가득한 창의 고양이!"],

INFJ:["🌙🐱","상담 고양이","친구 마음을 잘 이해하는 따뜻한 고양이!"],

INFP:["🌸🐱","감성 고양이","상상력이 풍부한 몽글몽글 고양이!"],

ENFJ:["💗🐱","응원 고양이","친구들을 챙기는 인기 많은 고양이!"],

ENFP:["🎉😸","모험 고양이","학교를 즐겁게 만드는 에너지 고양이!"],

ISTJ:["📚🐱","모범생 고양이","책임감 최고인 성실한 고양이!"],

ISFJ:["🧸🐱","배려 고양이","친구를 조용히 도와주는 고양이!"],

ESTJ:["📢🐱","반장 고양이","믿음직한 리더 고양이!"],

ESFJ:["😽","인기쟁이 고양이","친구들과 함께하는 걸 좋아하는 고양이!"],

ISTP:["🔧🐱","해결사 고양이","문제를 척척 해결하는 고양이!"],

ISFP:["🍀🐱","힐링 고양이","편안한 분위기를 만드는 고양이!"],

ESTP:["⚡🐱","액션 고양이","도전을 즐기는 활동적인 고양이!"],

ESFP:["🎈🐱","축제 고양이","모두를 웃게 만드는 분위기 고양이!"]

};



function result(){

document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";


let mbti="";

mbti+=score.E>=score.I?"E":"I";
mbti+=score.S>=score.N?"S":"N";
mbti+=score.T>=score.F?"T":"F";
mbti+=score.J>=score.P?"J":"P";


let r=cats[mbti];


document.getElementById("cat").innerHTML=r[0];

document.getElementById("mbti").innerHTML=mbti;

document.getElementById("title").innerHTML=r[1];

document.getElementById("desc").innerHTML=r[2];


}

</script>


</body>
</html>
